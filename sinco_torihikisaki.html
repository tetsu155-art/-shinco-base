<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取引先・受注管理 | 新興産業</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #f4f2ee;
    --surface: #ffffff;
    --surface2: #f9f8f6;
    --border: #e0dcd4;
    --border-strong: #c8c2b8;
    --text: #1a1714;
    --text-sub: #6b6560;
    --accent: #2c5f8a;
    --accent-light: #dce9f4;
    --accent2: #8a4a2c;
    --green: #2a6b4a;
    --green-light: #d4eddf;
    --red: #8a2c2c;
    --red-light: #f4dada;
    --yellow: #7a6010;
    --yellow-light: #fdf4d0;
    --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--text);
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: #aaa;
    text-transform: uppercase;
  }
  .header-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .header-divider { flex: 1; }
  .header-badge {
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    padding: 3px 10px;
    border-radius: 20px;
    color: #ccc;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 16px 24px 0;
    border-bottom: 2px solid var(--border);
    background: var(--bg);
  }
  .tab-btn {
    padding: 10px 24px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: var(--accent); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-count {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* ===== CONTENT ===== */
  .content { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ===== SECTION HEADER ===== */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #1e4a6e; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-danger {
    background: var(--red-light);
    color: var(--red);
    border: 1px solid #e8c0c0;
  }
  .btn-danger:hover { background: #ecc8c8; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ===== SEARCH BAR ===== */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-input {
    flex: 1;
    padding: 9px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-select {
    padding: 7px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    background: var(--surface);
    outline: none;
    cursor: pointer;
  }
  .filter-label {
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }

  /* ===== TABLE ===== */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }

  /* ===== BADGE ===== */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-pending { background: var(--yellow-light); color: var(--yellow); }
  .badge-shipped { background: var(--green-light); color: var(--green); }
  .badge-done    { background: #e8e8e8; color: #888; }
  .badge-new     { background: var(--accent-light); color: var(--accent); }

  /* ===== CHECKBOX ===== */
  .check-cell { text-align: center; }
  .ship-check {
    width: 18px; height: 18px;
    cursor: pointer;
    accent-color: var(--green);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ===== FORM ===== */
  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  input[type="text"],
  input[type="date"],
  input[type="number"],
  textarea,
  select {
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-sub);
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-text { font-size: 14px; }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: var(--shadow);
    min-width: 120px;
  }
  .stat-label { font-size: 11px; color: var(--text-sub); letter-spacing: 0.04em; }
  .stat-value { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--accent); }

  /* ===== OVERDUE ===== */
  .overdue td { background: #fff8f8 !important; }
  .overdue td:first-child { border-left: 3px solid var(--red); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .content { padding: 16px; }
    .tabs { padding: 12px 16px 0; overflow-x: auto; }
    .stats-bar { gap: 8px; }
    .form-row { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<header class="header">
  <span class="header-logo">SINCO</span>
  <span class="header-title">取引先・受注管理</span>
  <span class="header-divider"></span>
  <span class="header-badge">新興産業</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('torihiki')">
    🏢 取引先管理
    <span class="tab-count" id="count-torihiki">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('juchu')">
    📋 受注一覧
    <span class="tab-count" id="count-juchu">0</span>
  </button>
</div>

<div class="content">

  <!-- ======== 取引先管理 ======== -->
  <div class="panel active" id="panel-torihiki">
    <div class="stats-bar" id="stats-torihiki"></div>

    <div class="section-header">
      <span class="section-title">取引先一覧</span>
      <button class="btn btn-primary" onclick="openModal('torihiki-modal')">
        ＋ 取引先を追加
      </button>
    </div>

    <div class="search-bar">
      <input type="text" class="search-input" placeholder="会社名で検索…" oninput="renderTorihiki()" id="search-torihiki">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>会社名</th>
            <th>担当者</th>
            <th>電話</th>
            <th>メール</th>
            <th>備考</th>
            <th style="width:80px;text-align:center">操作</th>
          </tr>
        </thead>
        <tbody id="tbody-torihiki"></tbody>
      </table>
      <div id="empty-torihiki" class="empty-state" style="display:none">
        <div class="empty-icon">🏢</div>
        <div class="empty-text">取引先がまだありません</div>
      </div>
    </div>
  </div>

  <!-- ======== 受注一覧 ======== -->
  <div class="panel" id="panel-juchu">
    <div class="stats-bar" id="stats-juchu"></div>

    <div class="section-header">
      <span class="section-title">受注一覧</span>
      <button class="btn btn-primary" onclick="openModal('juchu-modal')">
        ＋ 受注を追加
      </button>
    </div>

    <div class="filter-bar">
      <input type="text" class="search-input" style="max-width:220px" placeholder="品番・品名で検索…" oninput="renderJuchu()" id="search-juchu">
      <span class="filter-label">絞り込み：</span>
      <select class="filter-select" onchange="renderJuchu()" id="filter-company">
        <option value="">全取引先</option>
      </select>
      <select class="filter-select" onchange="renderJuchu()" id="filter-status">
        <option value="">全ステータス</option>
        <option value="未出荷">未出荷</option>
        <option value="出荷済">出荷済</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>出荷</th>
            <th>受注日</th>
            <th>取引先</th>
            <th>品番</th>
            <th>品名</th>
            <th>数量</th>
            <th>金額（円）</th>
            <th>納品予定日</th>
            <th>備考</th>
            <th style="width:70px;text-align:center">操作</th>
          </tr>
        </thead>
        <tbody id="tbody-juchu"></tbody>
      </table>
      <div id="empty-juchu" class="empty-state" style="display:none">
        <div class="empty-icon">📋</div>
        <div class="empty-text">受注データがありません</div>
      </div>
    </div>
  </div>

</div><!-- /content -->

<!-- ======== 取引先 追加/編集 モーダル ======== -->
<div class="modal-overlay" id="torihiki-modal">
  <div class="modal">
    <div class="modal-title" id="torihiki-modal-title">取引先を追加</div>
    <div class="form-grid">
      <div class="form-group">
        <label>会社名 *</label>
        <input type="text" id="t-name" placeholder="例：向陽金属 株式会社">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>担当者名</label>
          <input type="text" id="t-person" placeholder="例：田中 一郎">
        </div>
        <div class="form-group">
          <label>電話番号</label>
          <input type="text" id="t-tel" placeholder="例：082-000-0000">
        </div>
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="text" id="t-email" placeholder="例：tanaka@example.com">
      </div>
      <div class="form-group">
        <label>備考</label>
        <textarea id="t-memo" placeholder="取引条件、特記事項など"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('torihiki-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTorihiki()">保存</button>
    </div>
  </div>
</div>

<!-- ======== 受注 追加/編集 モーダル ======== -->
<div class="modal-overlay" id="juchu-modal">
  <div class="modal">
    <div class="modal-title" id="juchu-modal-title">受注を追加</div>
    <div class="form-grid">
      <div class="form-row">
        <div class="form-group">
          <label>受注日 *</label>
          <input type="date" id="j-date">
        </div>
        <div class="form-group">
          <label>納品予定日</label>
          <input type="date" id="j-delivery">
        </div>
      </div>
      <div class="form-group">
        <label>取引先 *</label>
        <select id="j-company">
          <option value="">-- 選択 --</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>品番</label>
          <input type="text" id="j-code" placeholder="例：SH-1234">
        </div>
        <div class="form-group">
          <label>品名 *</label>
          <input type="text" id="j-item" placeholder="例：鉄板 加工品">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>数量</label>
          <input type="number" id="j-qty" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>金額（円）</label>
          <input type="number" id="j-price" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>備考</label>
        <textarea id="j-memo" placeholder="特記事項など"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('juchu-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveJuchu()">保存</button>
    </div>
  </div>
</div>

<script>
// ===========================
//  DATA STORE
// ===========================
const DB_T = 'sinco_torihiki_v1';
const DB_J = 'sinco_juchu_v1';

function loadTorihiki() {
  try { return JSON.parse(localStorage.getItem(DB_T) || '[]'); } catch { return []; }
}
function saveTorihikiDB(data) {
  localStorage.setItem(DB_T, JSON.stringify(data));
}
function loadJuchu() {
  try { return JSON.parse(localStorage.getItem(DB_J) || '[]'); } catch { return []; }
}
function saveJuchuDB(data) {
  localStorage.setItem(DB_J, JSON.stringify(data));
}

// ===========================
//  TAB
// ===========================
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick').includes(name)) b.classList.add('active');
  });
}

// ===========================
//  MODAL
// ===========================
let editingTId = null;
let editingJId = null;

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  editingTId = null;
  editingJId = null;
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ===========================
//  取引先
// ===========================
function renderTorihiki() {
  const data = loadTorihiki();
  const q = (document.getElementById('search-torihiki').value || '').trim().toLowerCase();
  const filtered = data.filter(r => !q || r.name.toLowerCase().includes(q));

  const tbody = document.getElementById('tbody-torihiki');
  const empty = document.getElementById('empty-torihiki');

  document.getElementById('count-torihiki').textContent = data.length;

  // Stats
  document.getElementById('stats-torihiki').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">取引先総数</div>
      <div class="stat-value">${data.length}</div>
    </div>
  `;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map((r, i) => `
    <tr>
      <td style="color:var(--text-sub);font-family:'IBM Plex Mono',monospace;font-size:11px">${i+1}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td>${esc(r.person || '—')}</td>
      <td>${esc(r.tel || '—')}</td>
      <td style="font-size:12px">${esc(r.email || '—')}</td>
      <td style="color:var(--text-sub);font-size:12px">${esc(r.memo || '')}</td>
      <td style="text-align:center">
        <button class="btn btn-secondary btn-sm" onclick="editTorihiki('${r.id}')">編集</button>
      </td>
    </tr>
  `).join('');

  // Update company filter in juchu
  updateCompanyFilter();
}

function openTorihikiModal() {
  document.getElementById('torihiki-modal-title').textContent = '取引先を追加';
  ['t-name','t-person','t-tel','t-email','t-memo'].forEach(id => document.getElementById(id).value = '');
  editingTId = null;
  openModal('torihiki-modal');
}

function editTorihiki(id) {
  const data = loadTorihiki();
  const r = data.find(x => x.id === id);
  if (!r) return;
  document.getElementById('torihiki-modal-title').textContent = '取引先を編集';
  document.getElementById('t-name').value = r.name || '';
  document.getElementById('t-person').value = r.person || '';
  document.getElementById('t-tel').value = r.tel || '';
  document.getElementById('t-email').value = r.email || '';
  document.getElementById('t-memo').value = r.memo || '';
  editingTId = id;
  openModal('torihiki-modal');
}

function saveTorihiki() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { alert('会社名を入力してください'); return; }
  const data = loadTorihiki();
  if (editingTId) {
    const idx = data.findIndex(x => x.id === editingTId);
    if (idx >= 0) {
      data[idx] = { ...data[idx],
        name,
        person: document.getElementById('t-person').value.trim(),
        tel:    document.getElementById('t-tel').value.trim(),
        email:  document.getElementById('t-email').value.trim(),
        memo:   document.getElementById('t-memo').value.trim(),
      };
    }
  } else {
    data.push({
      id: uid(),
      name,
      person: document.getElementById('t-person').value.trim(),
      tel:    document.getElementById('t-tel').value.trim(),
      email:  document.getElementById('t-email').value.trim(),
      memo:   document.getElementById('t-memo').value.trim(),
      createdAt: new Date().toISOString(),
    });
  }
  saveTorihikiDB(data);
  closeModal('torihiki-modal');
  renderTorihiki();
}

// ===========================
//  受注
// ===========================
function updateCompanyFilter() {
  const data = loadTorihiki();
  const sel = document.getElementById('filter-company');
  const jSel = document.getElementById('j-company');
  const cur = sel.value;

  sel.innerHTML = '<option value="">全取引先</option>' +
    data.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('');
  sel.value = cur;

  jSel.innerHTML = '<option value="">-- 選択 --</option>' +
    data.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('');
}

function renderJuchu() {
  const data = loadJuchu();
  const q = (document.getElementById('search-juchu').value || '').trim().toLowerCase();
  const fc = document.getElementById('filter-company').value;
  const fs = document.getElementById('filter-status').value;
  const today = toDateStr(new Date());

  const filtered = data.filter(r => {
    if (q && !((r.code||'').toLowerCase().includes(q) || (r.item||'').toLowerCase().includes(q))) return false;
    if (fc && r.company !== fc) return false;
    if (fs) {
      const shipped = r.shipped;
      if (fs === '未出荷' && shipped) return false;
      if (fs === '出荷済' && !shipped) return false;
    }
    return true;
  });

  document.getElementById('count-juchu').textContent = data.length;

  const totalAmt = data.reduce((s, r) => s + (Number(r.price) || 0), 0);
  const unshipped = data.filter(r => !r.shipped).length;
  const overdue = data.filter(r => !r.shipped && r.delivery && r.delivery < today).length;

  document.getElementById('stats-juchu').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">受注件数</div>
      <div class="stat-value">${data.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">未出荷</div>
      <div class="stat-value" style="color:${unshipped>0?'var(--yellow)':'var(--green)'}">${unshipped}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">期限超過</div>
      <div class="stat-value" style="color:${overdue>0?'var(--red)':'var(--green)'}">${overdue}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">合計金額</div>
      <div class="stat-value" style="font-size:15px">¥${totalAmt.toLocaleString()}</div>
    </div>
  `;

  const tbody = document.getElementById('tbody-juchu');
  const empty = document.getElementById('empty-juchu');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const isOverdue = !r.shipped && r.delivery && r.delivery < today;
    const deliveryCell = r.delivery
      ? `<span style="color:${isOverdue ? 'var(--red)' : 'inherit'};font-weight:${isOverdue?'700':'400'}">${r.delivery}${isOverdue?' ⚠':''}` + `</span>`
      : '—';
    return `
    <tr class="${isOverdue ? 'overdue' : ''}">
      <td class="check-cell">
        <input type="checkbox" class="ship-check" ${r.shipped ? 'checked' : ''} onchange="toggleShipped('${r.id}', this.checked)" title="${r.shipped ? '出荷済' : '未出荷'}">
      </td>
      <td style="white-space:nowrap;font-size:12px">${r.date || '—'}</td>
      <td>${esc(r.company || '—')}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${esc(r.code || '—')}</td>
      <td><strong>${esc(r.item || '—')}</strong></td>
      <td style="text-align:right;font-family:'IBM Plex Mono',monospace">${r.qty != null ? r.qty : '—'}</td>
      <td style="text-align:right;font-family:'IBM Plex Mono',monospace">${r.price ? '¥' + Number(r.price).toLocaleString() : '—'}</td>
      <td style="white-space:nowrap">${deliveryCell}</td>
      <td style="color:var(--text-sub);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.memo || '')}</td>
      <td style="text-align:center">
        <button class="btn btn-secondary btn-sm" onclick="editJuchu('${r.id}')">編集</button>
      </td>
    </tr>`;
  }).join('');
}

function toggleShipped(id, val) {
  const data = loadJuchu();
  const idx = data.findIndex(x => x.id === id);
  if (idx >= 0) {
    data[idx].shipped = val;
    data[idx].shippedAt = val ? new Date().toISOString() : null;
    saveJuchuDB(data);
    renderJuchu();
  }
}

function openJuchuModal() {
  document.getElementById('juchu-modal-title').textContent = '受注を追加';
  document.getElementById('j-date').value = toDateStr(new Date());
  ['j-delivery','j-code','j-item','j-qty','j-price','j-memo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('j-company').value = '';
  editingJId = null;
  openModal('juchu-modal');
}

function editJuchu(id) {
  const data = loadJuchu();
  const r = data.find(x => x.id === id);
  if (!r) return;
  document.getElementById('juchu-modal-title').textContent = '受注を編集';
  document.getElementById('j-date').value = r.date || '';
  document.getElementById('j-delivery').value = r.delivery || '';
  document.getElementById('j-company').value = r.company || '';
  document.getElementById('j-code').value = r.code || '';
  document.getElementById('j-item').value = r.item || '';
  document.getElementById('j-qty').value = r.qty != null ? r.qty : '';
  document.getElementById('j-price').value = r.price || '';
  document.getElementById('j-memo').value = r.memo || '';
  editingJId = id;
  openModal('juchu-modal');
}

function saveJuchu() {
  const item = document.getElementById('j-item').value.trim();
  if (!item) { alert('品名を入力してください'); return; }
  const data = loadJuchu();
  const entry = {
    date:     document.getElementById('j-date').value,
    delivery: document.getElementById('j-delivery').value,
    company:  document.getElementById('j-company').value,
    code:     document.getElementById('j-code').value.trim(),
    item,
    qty:      document.getElementById('j-qty').value,
    price:    document.getElementById('j-price').value,
    memo:     document.getElementById('j-memo').value.trim(),
  };
  if (editingJId) {
    const idx = data.findIndex(x => x.id === editingJId);
    if (idx >= 0) data[idx] = { ...data[idx], ...entry };
  } else {
    data.unshift({ id: uid(), shipped: false, shippedAt: null, createdAt: new Date().toISOString(), ...entry });
  }
  saveJuchuDB(data);
  closeModal('juchu-modal');
  renderJuchu();
}

// ===========================
//  UTILS
// ===========================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toDateStr(d) { return d.toFullYear ? null : d.toISOString().slice(0,10); }
function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

// ===========================
//  BUTTON WIRE-UP (override onclick in HTML)
// ===========================
// "＋ 取引先を追加" ボタン
document.querySelector('[onclick="openModal(\'torihiki-modal\')"]').onclick = openTorihikiModal;
// "＋ 受注を追加" ボタン
document.querySelector('[onclick="openModal(\'juchu-modal\')"]').onclick = openJuchuModal;

// ===========================
//  INIT
// ===========================
updateCompanyFilter();
renderTorihiki();
renderJuchu();
</script>
</body>
</html>
