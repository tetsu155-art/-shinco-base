<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINCO BASE — by HONDA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #e0ddd8;
      --accent: #1a3a6b;
      --accent2: #c0392b;
      --text: #111111;
      --muted: #888880;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
    }

    /* 背景の細い横線 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        180deg,
        transparent,
        transparent 39px,
        rgba(0,0,0,0.04) 39px,
        rgba(0,0,0,0.04) 40px
      );
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 580px;
      position: relative;
      z-index: 1;
    }

    /* 会社名ヘッダー */
    .company-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--text);
      animation: fadeDown 0.5s ease both;
    }

    .company-mark {
      width: 40px;
      height: 40px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .company-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text);
      line-height: 1.2;
    }

    .company-name-en {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* SHINCOロゴ */
    .header {
      margin-bottom: 48px;
      animation: fadeDown 0.5s 0.1s ease both;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      letter-spacing: 0.08em;
      line-height: 0.9;
      color: var(--accent);
    }

    .by-honda {
      font-family: "Bebas Neue", sans-serif;
      font-size: 28px;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-top: 8px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }

    .divider-line {
      height: 1px;
      background: var(--text);
      flex: 1;
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      background: var(--accent2);
      border-radius: 50%;
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* カード */
    .cards {
      display: grid;
      gap: 8px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.3s; }

    .card:hover {
      border-left-color: var(--accent2);
      transform: translateX(4px);
      box-shadow: 4px 4px 16px rgba(0,0,0,0.08);
    }

    .card-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      color: var(--text);
    }

    .card-desc {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .card-arrow {
      font-size: 16px;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--accent2);
      transform: translateX(4px);
    }

    /* フッター */
    .footer {
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.5s 0.4s ease both;
    }

    .footer-left {
      font-family: 'Shippori Mincho', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .footer-right {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--border);
      text-transform: uppercase;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="company-header">
      <div>
        <div class="company-name">株式会社 新興産業</div>
        <div class="company-name-en">Shinco Sangyo Co., Ltd.</div>
      </div>
    </div>

    <div class="header">
      <div class="logo">SHINCO<br>BASE</div>
      <div class="by-honda">— by Honda</div>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>
      <div class="tagline">Internal Management System</div>
    </div>

    <div class="cards">
      <a class="card" href="weight.html">
        <div class="card-icon">⚖️</div>
        <div class="card-body">
          <div class="card-title">重量計算</div>
          <div class="card-desc">鉄材重量・展開計算 / 本田式</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="sinco_torihikisaki.html">
        <div class="card-icon">📋</div>
        <div class="card-body">
          <div class="card-title">顧客・受注管理</div>
          <div class="card-desc">取引先 / 受注 / 外注 / 在庫</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <div class="footer">
      <div class="footer-left">株式会社新興産業</div>
      <div class="footer-right">Internal Use Only</div>
    </div>

  </div>
</body>
</html>
